<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>✦ The Penthouse ✦</title>
<style>
:root{
  --bg-dark:#0d0d1a;--bg-panel:#13131f;--bg-card:#1a1a2e;--bg-input:#1e1e30;
  --accent-pink:#e040a0;--accent-purple:#9b59b6;--accent-blue:#5b8dee;
  --text-main:#e8e0f0;--text-muted:#8878aa;--text-dim:#554a6a;--border:#2a2040;
  --kai:#ff69b4;--ren:#82c0e8;--yuki:#c792ea;--dom:#ff7b5e;--ash:#90a4ae;
  --player:#69e89a;--bad:#cc3333;--dark-meter:#8b1a1a;
  --radius:12px;--radius-sm:8px;--sidebar-w:210px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg-dark);color:var(--text-main);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;display:flex;flex-direction:column}

/* ───────────── SETUP ───────────── */
#setup-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  height:100%;overflow-y:auto;padding:28px 16px 40px;
  background:radial-gradient(ellipse at 50% 0%,#1e0038 0%,var(--bg-dark) 70%);
}
.setup-logo{font-size:2.4rem;font-weight:900;letter-spacing:.06em;text-align:center;
  background:linear-gradient(135deg,var(--accent-pink),var(--accent-purple),var(--accent-blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.setup-sub{color:var(--text-muted);font-size:.85rem;letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:28px;text-align:center}
.setup-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px 26px;width:100%;max-width:430px;display:flex;flex-direction:column;gap:14px;
  box-shadow:0 8px 40px rgba(160,50,200,.15)}
.setup-card h2{font-size:.85rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.fg input,.fg select{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text-main);font-size:.9rem;padding:9px 13px;outline:none;transition:border-color .2s;width:100%}
.fg input:focus,.fg select:focus{border-color:var(--accent-purple)}
.fg select option{background:var(--bg-card)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
#gender-stats{overflow:hidden;transition:max-height .4s ease,opacity .3s ease;max-height:0;opacity:0;display:flex;flex-direction:column;gap:12px}
#gender-stats.visible{max-height:500px;opacity:1}
.gender-sec-title{font-size:.75rem;color:var(--accent-pink);text-transform:uppercase;letter-spacing:.1em;
  padding-top:4px;border-top:1px solid var(--border)}
.btn-start{margin-top:6px;padding:12px;
  background:linear-gradient(135deg,var(--accent-pink),var(--accent-purple));
  border:none;border-radius:var(--radius-sm);color:#fff;font-size:.95rem;font-weight:700;
  letter-spacing:.06em;cursor:pointer;transition:opacity .2s,transform .1s}
.btn-start:hover{opacity:.9;transform:translateY(-1px)}

/* ───────────── GAME ───────────── */
#game-screen{display:none;flex:1;overflow:hidden;min-height:0}
#game-screen.active{display:flex}

/* Sidebar */
#sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg-panel);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  padding:14px 10px;gap:10px;overflow-y:auto;transition:transform .3s ease}
.sb-title{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);
  padding-bottom:7px;border-bottom:1px solid var(--border)}
.li-card{display:flex;flex-direction:column;gap:3px;cursor:pointer;
  padding:5px 4px;border-radius:6px;transition:background .15s}
.li-card:hover{background:rgba(255,255,255,.04)}
.li-hdr{display:flex;align-items:center;gap:6px}
.li-av{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.72rem;flex-shrink:0;font-weight:bold}
.li-name{font-size:.78rem;font-weight:600;flex:1}
.li-pct{font-size:.68rem;color:var(--text-muted);min-width:28px;text-align:right}
.meter-track{background:var(--bg-dark);border-radius:99px;height:4px;overflow:hidden;margin:1px 0}
.meter-fill{height:100%;border-radius:99px;transition:width .6s ease}
.dark-track{background:#200505;border-radius:99px;height:3px;overflow:hidden}
.dark-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#8b1a1a,#cc3333);transition:width .6s ease}
.dark-label{font-size:.6rem;color:#cc5555;letter-spacing:.05em}

.sb-chapter{font-size:.65rem;color:var(--text-dim);text-align:center;
  padding-top:10px;border-top:1px solid var(--border);line-height:1.5;margin-top:auto}
.sb-actions{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.sb-btn{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;
  color:var(--text-muted);font-size:.72rem;padding:7px 10px;cursor:pointer;
  text-align:center;transition:border-color .2s,color .2s}
.sb-btn:hover{border-color:var(--accent-purple);color:var(--text-main)}

/* Chat */
#chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#chat-header{background:var(--bg-panel);border-bottom:1px solid var(--border);
  padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.ch-icon{font-size:1.1rem}
.ch-name{font-weight:700;font-size:.9rem}
.ch-members{font-size:.7rem;color:var(--text-muted)}
.ch-hamburger{margin-left:auto;background:none;border:1px solid var(--border);
  border-radius:6px;color:var(--text-muted);padding:5px 8px;cursor:pointer;font-size:.8rem;display:none}

#messages{flex:1;overflow-y:auto;padding:14px 10px;display:flex;flex-direction:column;gap:3px;scroll-behavior:smooth;min-height:0}
.msg-row{display:flex;align-items:flex-end;gap:6px;max-width:78%;animation:fsu .22s ease both}
@keyframes fsu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-row.player-row{align-self:flex-end;flex-direction:row-reverse}
.msg-row.npc-row{align-self:flex-start}
.msg-av{width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.65rem;font-weight:bold;flex-shrink:0;align-self:flex-end}
.msg-content{display:flex;flex-direction:column;gap:2px}
.msg-sname{font-size:.66rem;color:var(--text-muted);margin-bottom:1px;padding-left:2px}
.msg-bubble{padding:8px 12px;border-radius:15px;font-size:.85rem;line-height:1.45;word-wrap:break-word}
.npc-row .msg-bubble{border-bottom-left-radius:4px;background:var(--bg-card);border:1px solid var(--border)}
.player-row .msg-bubble{border-bottom-right-radius:4px;background:linear-gradient(135deg,#1b4332,#155e42);
  border:1px solid #2d6a4f;color:#d8f3dc}
.msg-narration{align-self:center;text-align:center;font-size:.75rem;color:var(--text-muted);
  font-style:italic;padding:5px 14px;border:1px solid var(--border);border-radius:99px;
  background:var(--bg-panel);margin:5px 0;animation:fsu .22s ease both}
.msg-chapter{align-self:center;text-align:center;padding:9px 22px;margin:12px 0;
  background:linear-gradient(135deg,rgba(154,50,200,.15),rgba(90,100,230,.15));
  border:1px solid rgba(154,50,200,.3);border-radius:99px;font-size:.82rem;font-weight:700;
  letter-spacing:.08em;color:#c7b4f0;animation:fsu .28s ease both}
.msg-spicy{align-self:center;text-align:center;padding:8px 20px;margin:8px 0;
  background:linear-gradient(135deg,rgba(220,50,50,.1),rgba(200,20,100,.1));
  border:1px solid rgba(200,50,50,.3);border-radius:99px;font-size:.75rem;
  color:#e88;animation:fsu .22s ease both}
.typing-row{align-self:flex-start;display:flex;align-items:center;gap:6px;padding:3px 0;animation:fsu .18s ease both}
.typing-name{font-size:.68rem;color:var(--text-muted)}
.typing-dots{display:flex;gap:3px;align-items:center}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--text-dim);animation:bounce 1.1s infinite}
.typing-dots span:nth-child(2){animation-delay:.18s}
.typing-dots span:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

/* Choices */
#choices-area{background:var(--bg-panel);border-top:1px solid var(--border);
  padding:10px 12px;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
#choices-area.hidden{display:none}
.choices-label{font-size:.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1px}
.choice-wrap{display:flex;flex-direction:column;gap:2px}
.choice-btn{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text-main);font-size:.82rem;padding:9px 12px;text-align:left;cursor:pointer;
  transition:background .15s,border-color .15s,transform .1s;line-height:1.4}
.choice-btn:hover{background:#1f1f38;border-color:var(--accent-purple);transform:translateX(2px)}
.choice-effects{font-size:.65rem;color:var(--text-dim);padding:0 3px 2px;display:flex;flex-wrap:wrap;gap:4px}
.effect-tag{padding:1px 6px;border-radius:99px;font-size:.62rem;font-weight:600}
.effect-pos{background:rgba(100,220,130,.12);color:#7edb9b;border:1px solid rgba(100,220,130,.2)}
.effect-neg{background:rgba(220,80,80,.12);color:#e88;border:1px solid rgba(220,80,80,.2)}
.effect-dark{background:rgba(150,30,30,.2);color:#cc6666;border:1px solid rgba(150,30,30,.3)}

/* Affection pop */
.aff-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-60%) scale(.8);
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:7px 16px;font-size:.82rem;font-weight:600;pointer-events:none;z-index:999;
  opacity:0;transition:all .2s;white-space:nowrap}
.aff-pop.show{opacity:1;transform:translate(-50%,-70%) scale(1)}

/* ───────────── MODALS ───────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:1000;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 60px rgba(0,0,0,.6)}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hdr h3{font-size:1rem;font-weight:700}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:1.2rem;cursor:pointer;padding:4px 8px;border-radius:6px}
.modal-close:hover{color:var(--text-main);background:var(--bg-input)}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.btn-secondary{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text-muted);font-size:.85rem;padding:8px 16px;cursor:pointer;transition:color .2s}
.btn-secondary:hover{color:var(--text-main)}
.btn-primary{background:linear-gradient(135deg,var(--accent-pink),var(--accent-purple));
  border:none;border-radius:var(--radius-sm);color:#fff;font-size:.85rem;font-weight:700;
  padding:8px 18px;cursor:pointer;transition:opacity .2s}
.btn-primary:hover{opacity:.88}

/* Character info card */
.char-info-card{background:var(--bg-input);border-radius:var(--radius-sm);padding:14px;
  display:flex;flex-direction:column;gap:10px}
.char-info-hdr{display:flex;align-items:center;gap:10px}
.char-info-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;font-weight:bold;flex-shrink:0}
.char-info-name{font-size:1.1rem;font-weight:700}
.char-info-sub{font-size:.75rem;color:var(--text-muted)}
.char-info-desc{font-size:.82rem;color:var(--text-muted);line-height:1.55}
.char-info-trait{font-size:.75rem;padding:4px 10px;border-radius:99px;display:inline-flex;width:fit-content}
.char-meter-row{display:flex;flex-direction:column;gap:5px}
.char-meter-label{font-size:.72rem;color:var(--text-muted);display:flex;justify-content:space-between}

/* Char select tabs */
.char-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:0 20px 0}
.char-tab{background:var(--bg-input);border:1px solid var(--border);border-radius:99px;
  padding:5px 12px;font-size:.75rem;cursor:pointer;transition:all .15s;color:var(--text-muted)}
.char-tab.active{color:#fff;border-color:transparent}

/* Stats overview */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-item{background:var(--bg-input);border-radius:var(--radius-sm);padding:10px 12px}
.stat-label{font-size:.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.stat-val{font-size:.9rem;font-weight:600}
.stat-bars{display:flex;flex-direction:column;gap:8px}
.stat-bar-row{display:flex;flex-direction:column;gap:3px}
.stat-bar-label{font-size:.72rem;display:flex;justify-content:space-between}

/* End screen */
#end-screen{display:none;position:fixed;inset:0;background:var(--bg-dark);
  z-index:2000;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;text-align:center;gap:20px;overflow-y:auto}
#end-screen.open{display:flex}
.end-title{font-size:2rem;font-weight:900;letter-spacing:.06em}
.end-sub{font-size:.95rem;color:var(--text-muted);max-width:480px;line-height:1.7}
.end-content{font-size:.88rem;color:var(--text-main);max-width:500px;line-height:1.8;
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px}
.btn-replay{background:linear-gradient(135deg,var(--accent-pink),var(--accent-purple));
  border:none;border-radius:var(--radius-sm);color:#fff;font-size:.95rem;font-weight:700;
  padding:12px 28px;cursor:pointer;margin-top:8px}

/* Scrollbars */
#messages::-webkit-scrollbar{width:3px}
#messages::-webkit-scrollbar-track{background:transparent}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
#sidebar::-webkit-scrollbar{width:3px}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

/* Responsive */
@media(max-width:720px){
  :root{--sidebar-w:0px}
  #sidebar{position:fixed;left:0;top:0;bottom:0;width:200px;z-index:500;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  .ch-hamburger{display:block}
}
@media(max-width:480px){
  .msg-row{max-width:90%}
  .setup-card{padding:18px 18px}
  .modal-body{padding:14px 16px}
}
</style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div id="setup-screen">
  <div class="setup-logo">✦ THE PENTHOUSE ✦</div>
  <div class="setup-sub">An Otome Visual Novel · 20 Chapters</div>
  <div class="setup-card">
    <h2>Create Your Character</h2>
    <div class="fg"><label>Name</label><input id="s-name" placeholder="Enter your name…" maxlength="22"></div>
    <div class="field-row">
      <div class="fg"><label>Age</label><input type="number" id="s-age" placeholder="e.g. 21" min="18" max="99"></div>
      <div class="fg"><label>Gender</label>
        <select id="s-gender">
          <option value="">— Select —</option>
          <option value="female">Female</option>
          <option value="male">Male</option>
          <option value="nonbinary">Non-binary</option>
        </select>
      </div>
    </div>
    <div id="gender-stats">
      <div class="gender-sec-title" id="gender-sec-lbl">Physical Stats</div>
      <div class="field-row">
        <div class="fg"><label>Height</label><input id="s-height" placeholder="e.g. 5′4″"></div>
        <div class="fg"><label>Weight</label><input id="s-weight" placeholder="e.g. 120 lbs"></div>
      </div>
      <div id="female-fields">
        <div class="field-row">
          <div class="fg"><label>Waist</label><input id="s-waist" placeholder="e.g. 24 in"></div>
          <div class="fg"><label>Cup Size</label>
            <select id="s-cup">
              <option value="">— Select —</option>
              <option>AA</option><option>A</option><option>B</option><option>C</option>
              <option>D</option><option>D+</option><option>DD</option><option>DDD/E</option>
              <option>F</option><option>G</option><option>G+</option>
            </select>
          </div>
        </div>
      </div>
      <div id="male-fields" style="display:none">
        <div class="field-row">
          <div class="fg"><label>Body Type</label>
            <select id="s-bodytype">
              <option value="">— Select —</option>
              <option>Slim</option><option>Athletic</option><option>Muscular</option>
              <option>Stocky</option><option>Heavyset</option>
            </select>
          </div>
          <div class="fg"><label>D*ck Size</label><input id="s-dicksize" placeholder="e.g. 7 in"></div>
        </div>
      </div>
      <div id="nb-fields" style="display:none">
        <div class="fg"><label>Body Type</label>
          <select id="s-bodytype-nb">
            <option value="">— Select —</option>
            <option>Petite</option><option>Slim</option><option>Athletic</option>
            <option>Curvy</option><option>Muscular</option>
          </select>
        </div>
      </div>
    </div>
    <button class="btn-start" onclick="startGame()">✦ Begin Story ✦</button>
  </div>
</div>

<!-- ══ GAME ══ -->
<div id="game-screen">
  <div id="sidebar">
    <div class="sb-title">♡ Love &amp; Obsession</div>
    <div id="li-cards"></div>
    <div class="sb-actions">
      <button class="sb-btn" onclick="openEditProfile()">✏️ Edit Profile</button>
      <button class="sb-btn" onclick="openCharInfo()">👤 Character Info</button>
      <button class="sb-btn" onclick="openStats()">📊 View Stats</button>
    </div>
    <div class="sb-chapter" id="sb-chapter">Prologue</div>
  </div>

  <div id="chat-main">
    <div id="chat-header">
      <div class="ch-icon">💬</div>
      <div><div class="ch-name">The Penthouse 🏙️</div><div class="ch-members">Kai · Ren · Yuki · Dominique · Ash · You</div></div>
      <button class="ch-hamburger" onclick="toggleSidebar()">☰</button>
    </div>
    <div id="messages"></div>
    <div id="choices-area" class="hidden">
      <div class="choices-label">Your reply…</div>
      <div id="choices-list"></div>
    </div>
  </div>
</div>

<!-- ══ MODALS ══ -->
<!-- Edit Profile -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-hdr"><h3>✏️ Edit Profile</h3><button class="modal-close" onclick="closeModal('modal-edit')">✕</button></div>
    <div class="modal-body" id="edit-body"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('modal-edit')">Cancel</button>
      <button class="btn-primary" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</div>

<!-- Char Info -->
<div class="modal-overlay" id="modal-chars">
  <div class="modal">
    <div class="modal-hdr"><h3>👤 Love Interests</h3><button class="modal-close" onclick="closeModal('modal-chars')">✕</button></div>
    <div style="padding:12px 20px 0"><div class="char-tabs" id="char-tabs"></div></div>
    <div class="modal-body" id="char-info-body"></div>
  </div>
</div>

<!-- Stats -->
<div class="modal-overlay" id="modal-stats">
  <div class="modal">
    <div class="modal-hdr"><h3>📊 Status Overview</h3><button class="modal-close" onclick="closeModal('modal-stats')">✕</button></div>
    <div class="modal-body" id="stats-body"></div>
  </div>
</div>

<!-- End Screen -->
<div id="end-screen">
  <div class="end-title" id="end-title"></div>
  <div class="end-sub" id="end-sub"></div>
  <div class="end-content" id="end-content"></div>
  <button class="btn-replay" onclick="replayGame()">↺ Play Again</button>
</div>

<div class="aff-pop" id="aff-pop"></div>

<script>
// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
const G={
  player:{},
  love:{Kai:0,Ren:0,Yuki:0,Dominique:0,Ash:0},
  dark:{Kai:0,Ren:0,Yuki:0,Dominique:0,Ash:0},
  flags:{},
  chapter:'Prologue',
  sceneDepth:0,
  gameStarted:false,
};

// Character metadata
const CHARS={
  Kai:{color:'var(--kai)',bg:'#3d1a2a',init:'K',emoji:'🌸',
    name:'Kai Nakamura',age:21,year:'3rd Year',major:'Architecture',
    type:'The Caretaker',
    desc:'Warm, attentive, and endlessly patient. Kai is the unofficial "mom" of the group — always the first to check if you\'ve eaten, the last to sleep before everyone\'s home safe. Beneath his sunshine exterior is a quiet loneliness he\'s never let anyone close enough to see.',

function applyEffects(effects){
  if(!effects)return;
  const parts=[];
  for(const[k,v]of Object.entries(effects)){
    if(k.startsWith('dark_')){
      const id=k.replace('dark_','');
      if(id in G.dark){G.dark[id]=Math.max(0,Math.min(100,G.dark[id]+v));parts.push(`🌑${v>0?'+':''}${v} ${id}`)}
    }else if(k in G.love){
      G.love[k]=Math.max(0,Math.min(100,(G.love[k]||0)+v));
      parts.push(`${CHARS[k]?.emoji||'♡'}${v>0?'+':''}${v} ${k}`);
    }
  }
  updateMeters();
  if(parts.length)showAffPop(parts.join(' · '));
}

function resolveText(text,p){
  if(!p||typeof text!=='string')return text||'';
  const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return text
    .replace(/\{name\}/g,esc(p.name)).replace(/\{age\}/g,esc(p.age))
    .replace(/\{height\}/g,esc(p.height)).replace(/\{weight\}/g,esc(p.weight))
    .replace(/\{waist\}/g,esc(p.waist||'your waist')).replace(/\{cup\}/g,esc(p.cup||'your size'))
    .replace(/\{bodytype\}/g,esc(p.bodytype||'your build')).replace(/\{dicksize\}/g,esc(p.dicksize||'your size'))
    .replace(/\{he_she\}/g,p.gender==='male'?'he':p.gender==='female'?'she':'they')
    .replace(/\{him_her\}/g,p.gender==='male'?'him':p.gender==='female'?'her':'them')
    .replace(/\{his_her\}/g,p.gender==='male'?'his':p.gender==='female'?'her':'their');
}

function getEffectTags(effects){
  if(!effects)return'';
  return Object.entries(effects).map(([k,v])=>{
    if(k.startsWith('dark_')){const id=k.replace('dark_','');return`<span class="effect-tag effect-dark">🌑${v>0?'+':''}${v} ${id}</span>`}
    if(k in G.love){const ch=CHARS[k];return`<span class="effect-tag ${v>0?'effect-pos':'effect-neg'}">${ch?.emoji||'♡'}${v>0?'+':''}${v} ${k}</span>`}
    return'';
  }).join('');
}

async function runScene(beats){
  G.sceneDepth++;
  const p=G.player;
  for(let i=0;i<beats.length;i++){
    let beat=beats[i];
    if(typeof beat==='function')beat=beat(p);
    if(!beat)continue;
    const t=beat.type;
    if(t==='narration'){await delay(320);renderNarration(resolveText(beat.text,p),beat.spicy);await delay(380)}
    else if(t==='chapter'){await delay(500);renderChapter(beat.text);G.chapter=beat.text;await delay(600)}
    else if(t==='message'){
      const td=Math.min((beat.text?.length||30)*25+500,2800);
      const el=showTyping(beat.speaker);await delay(td);el.remove();
      renderMessage(beat.speaker,resolveText(beat.text,p));await delay(beat.delay||280);
    }
    else if(t==='player'){await delay(200);renderMessage('__p__',resolveText(beat.text,p),true);await delay(260)}
    else if(t==='choice'){await showChoicesAsync(beat.options,p)}
    else if(t==='flag'){G.flags[beat.key]=beat.value}
    else if(t==='branch'&&beat.scene){await runScene(beat.scene)}
    else if(t==='end'){showEnding(beat.which);break}
    else if(t==='check'){checkEndings();break}
  }
  G.sceneDepth--;
}

function showChoicesAsync(options,p){
  return new Promise(resolve=>{
    const area=document.getElementById('choices-area');
    const list=document.getElementById('choices-list');
    area.classList.remove('hidden');list.innerHTML='';
    options.forEach(opt=>{
      const rawText=typeof opt.text==='function'?opt.text(p):opt.text;
      const resolved=resolveText(rawText,p);
      const wrap=document.createElement('div');wrap.className='choice-wrap';
      const btn=document.createElement('button');btn.className='choice-btn';btn.textContent=resolved;
      const efDiv=document.createElement('div');efDiv.className='choice-effects';
      efDiv.innerHTML=getEffectTags(opt.effects);
      wrap.appendChild(btn);wrap.appendChild(efDiv);list.appendChild(wrap);
      btn.onclick=async()=>{
        area.classList.add('hidden');list.innerHTML='';
        renderMessage('__p__',resolved,true);await delay(280);
        if(opt.effects)applyEffects(opt.effects);
        if(opt.flag)G.flags[opt.flag.key]=opt.flag.value;
        if(opt.response)await runScene(opt.response);
        resolve(opt);
      };
    });
    scrollBot();
  });
}

function delay(ms){return new Promise(r=>setTimeout(r,ms))}

function checkEndings(){
  const loves=G.love;const darks=G.dark;
  // Bad ending if player tried to run and any dark >= 85
  const maxDark=Math.max(...Object.values(darks));
  if(G.flags.triedToRun&&maxDark>=85){showEnding('bad');return}
  // Good ending: all love >= 65 and all dark < 60
  const allLovesHigh=Object.values(loves).every(v=>v>=65);
  const allDarksLow=Object.values(darks).every(v=>v<60);
  if(allLovesHigh&&allDarksLow){showEnding('good');return}
  // Normal: pick highest love character if >=50
  const sorted=Object.entries(loves).sort((a,b)=>b[1]-a[1]);
  if(sorted[0][1]>=50){showNormalEnding(sorted[0][0]);return}
  showEnding('neutral');
}

    esub.textContent='You tried to leave. They couldn\'t let you.';
    ec.innerHTML=`<p>The five of them stood between you and the door, and for the first time you saw it — the cracks in their masks. Yuki's gentle eyes had gone still and dark. Ren had set down his composure like a coat he didn't need anymore. Dominique had stopped smiling. Ash had stepped out of the shadows for once, fully visible. And Kai — sweet, careful Kai — was crying, but his grip on your wrist didn't loosen.</p>
<p style="margin-top:12px">"You can't leave us," Yuki said, and it wasn't a plea. It was a fact he'd already decided.</p>
<p style="margin-top:12px">They moved you to the penthouse — Floor 12. The city stretched endlessly below, beautiful and unreachable. They took turns staying with you. They brought you things you loved. They were tender, devoted, and completely, irreversibly obsessed.</p>
<p style="margin-top:12px">You stopped trying to count the days. The city lights were always there when you wanted them. So were they. Always — one of them, all of them. Every night a different warmth, every morning a different pair of eyes watching you wake up.</p>
<p style="margin-top:12px">You told yourself it was terrible. But somewhere in the tangle of five people who would burn the world to keep you safe — you stopped entirely convincing yourself.</p>
<p style="margin-top:14px;font-style:italic;color:var(--text-muted)">🔞 The nights in the Penthouse were… thorough. Each of them had their way of reminding you that you were theirs. Yuki with whispered possessive promises. Ren with precise, devastating attention. Dominique loud and shameless and somehow exactly right. Ash silent and overwhelming. Kai so unbearably gentle it broke you open every single time. You were never left wanting. You were never left alone. You were never leaving.</p>`;
  }else if(which==='good'){
    et.textContent='✨ True Ending — All Five';
    et.style.color='var(--accent-pink)';
    esub.textContent='You chose all of them. Somehow, impossibly — they chose each other too.';
    ec.innerHTML=`<p>It started as a conversation — the six of you on the rooftop, city lights below, the comfortable silence that had built over months of shared meals and late-night texts and small disasters. Kai had made tea. Ren had pretended not to want any. Ash had taken his without being asked. Dominique had spilled his.</p>
<p style="margin-top:12px">"This is weird," Dominique said finally. "That I'm okay with... all of them also—"</p>
<p style="margin-top:12px">"Don't finish that sentence," Ren said. And then: "...I know."</p>
<p style="margin-top:12px">Yuki had simply looked at you. "I always knew I couldn't have you to myself. I just needed to know you weren't leaving."</p>
<p style="margin-top:12px">Ash: "Same."</p>
<p style="margin-top:12px">Kai had laughed — soft and broken and relieved — and pulled you into a hug that somehow fit all six of you eventually.</p>
<p style="margin-top:12px">It was unconventional. It was chaotic. It was warm in a way you'd stopped believing you deserved. Five different kinds of love, each of them complete, none of them requiring you to be less.</p>
<p style="margin-top:14px;font-style:italic;color:var(--text-muted)">🔞 The Penthouse became yours in every sense. Some nights it was just one of them — Ren appearing at your door at midnight with something he'd never say in daylight, Ash's rare and devastating directness, Dominique's relentless enthusiastic devotion, Kai's tender sweetness, Yuki's consuming and finally-safe intensity. Some nights it was more than one. Those nights were their own language — a warmth so thick you thought you'd dissolve in it. You didn't. You stayed. You were exactly where you were supposed to be.</p>`;
  }else if(which.startsWith('normal_')){
    showNormalEnding(which.replace('normal_',''));
    return;
  }else{
    showNormalEnding(Object.entries(G.love).sort((a,b)=>b[1]-a[1])[0][0]);
    return;
  }
  es.classList.add('open');
}

      body:`<p>Kai made breakfast. He always did — it had started as casual, evolved into habit, settled into something neither of you named for a long time because naming it might break it. The morning light made his hair look like it had been painted. You watched him from the doorway and felt something enormous and quiet settle in your chest.</p>
<p style="margin-top:12px">"You're staring," he said without turning around.</p>
<p style="margin-top:12px">"I know."</p>
<p style="margin-top:12px">He turned then. Whatever he saw on your face made him set down the spatula and cross the kitchen in three steps. His hands were warm when they cupped your face. He'd wanted to do this for so long he'd started memorizing your face in preparation.</p>
<p style="margin-top:12px">"I'm kind of embarrassingly in love with you," he said. "Like — embarrassingly."</p>
<p style="margin-top:12px">"Good," you said. "Same."</p>
<p style="margin-top:14px;font-style:italic;color:var(--text-muted)">🔞 The breakfast got cold. Kai apologized for it, flushed, twice. You told him it was worth it. He tucked his face against your neck and made a small sound you decided to spend your life collecting. He was endlessly attentive — paying attention to every detail of what you loved, what made you gasp, what made you melt — and somehow, unbearably, that made it even harder to breathe. You ate reheated eggs at noon, tangled together on his couch. He said "I love you" six more times. You stopped counting after three.</p>`

      body:`<p>Ren didn't say "I love you" first. He said it by learning your coffee order and having it there before you asked. By reading your drafts at 1 AM without being asked. By standing in front of you when someone looked at you too long and saying nothing, needing nothing, just being there like a wall of controlled quiet.</p>
<p style="margin-top:12px">The night it broke open, it was raining. He stood in your doorway with water in his hair and said, without preamble: "I have been trying not to want this. I'm very good at controlling myself. You are the single thing I cannot control."</p>
<p style="margin-top:12px">You stepped aside to let him in. He came. For the first time, Ren Ashford let someone else take the lead.</p>
<p style="margin-top:14px;font-style:italic;color:var(--text-muted)">🔞 He was devastating when he let himself be. Precise and intense and completely, finally unguarded — the ice cracked all at once. He kissed like he argued, like he studied, like he breathed — with total commitment and zero wasted motion. Afterward he didn't leave. He stayed with one arm around you and said, very quietly, "I'm not good at this." You told him he was. He didn't argue. That was how you knew he believed you.</p>`
    },
    Yuki:{
      title:'🌙 Yuki\'s Ending — Safe Obsession',
      sub:'His love was consuming. You learned the difference between a cage and a home.',
      body:`<p>Yuki had known for a long time. He told you this — on the rooftop, in the dark, his voice as steady as someone who'd rehearsed this and every possible version of your response. "I know what I am," he said. "I know how it looks. I need you to know that what I feel is real, even if the way I feel it is..."</p>
<p style="margin-top:12px">"Intense?" you offered.</p>
<p style="margin-top:12px">"Yes." He looked at you. "I would never trap you. But I need you to understand that you have always been — the only thing that makes me feel like I'm not watching the world through glass."</p>
<p style="margin-top:12px">You reached out and took his hand. His whole body stilled like you'd touched something rare.</p>
<p style="margin-top:12px">"Then stop watching," you said. "Just be here."</p>
<p style="margin-top:14px;font-style:italic;color:var(--text-muted)">🔞 He was trembling when you kissed him — barely, controlled, but there. Yuki's devotion in private was extraordinary. He paid attention in a way that was almost too much to handle — like every breath you took was something he'd been memorizing. Afterward he held on like you might disappear. "Don't go," he said. "Just — stay. Please." You stayed. And every time after that, he asked less desperately. He was learning to trust that you'd come back. And you always did.</p>`

      title:'🔥 Dominique\'s Ending — No More Jokes',
      sub:'He finally ran out of deflections. What was left was the realest thing you\'d ever seen.',
      body:`<p>Dominique showed up at your door at 11 PM with a plant. A succulent. A very small one. He held it out and said: "I Googled 'what to bring when you love someone but you're terrified of being serious' and somehow a plant came up and now I'm here."</p>
<p style="margin-top:12px">You stared at him. He stared back. He was — for the first time you could remember — not performing anything.</p>
<p style="margin-top:12px">"I'm in love with you," he said. "I know I've said like fifty things that could've sounded like this. But I mean — I am <i>actually in love</i> with you. I think about you all the time. It's annoying. I hate it. Please date me."</p>
<p style="margin-top:12px">You took the plant. Then you grabbed his collar and kissed him before he could ruin it with another joke.</p>
<p style="margin-top:14px;font-style:italic;color:var(--text-muted)">🔞 He laughed against your mouth — genuine, surprised, delighted — and then stopped laughing very quickly when you made clear you were serious. Dominique was exactly as enthusiastic in private as he was everywhere else, and somehow also completely tuned to you, adjusting and responding and grinning like every moment was a gift he couldn't believe he'd been given. He told you afterward that it was better than he'd imagined. "And I have a very good imagination," he clarified. You threw a pillow at him. He caught it and kept grinning. You loved him so much it was ridiculous.</p>`

    Ash:{
      title:'🖤 Ash\'s Ending — Seen',
      sub:'He knew everything about you before you spoke. You learned the weight of being truly seen.',
      body:`<p>The rooftop. Midnight. He had been coming here for months before he ever told you. You found out because you went up one night and he was already there, sitting at the edge with the city below him, and he looked at you over his shoulder without surprise.</p>
<p style="margin-top:12px">"You knew I'd come," you said.</p>
<p style="margin-top:12px">"You couldn't sleep. You always come up when you can't sleep." He moved over. You sat down next to him. The city spread out beneath you like a living thing.</p>
<p style="margin-top:12px">"That's unsettling," you said.</p>
<p style="margin-top:12px">"I know. I'm sorry." He looked at you. "I see you. I've always seen you. It started as information. It became — something else."</p>
<p style="margin-top:12px">"What else?"</p>
<p style="margin-top:12px">He answered by taking your hand. That was the whole sentence.</p>
<p style="margin-top:14px;font-style:italic;color:var(--text-muted)">🔞 Ash was slow and certain and overwhelming in the way that only very quiet things are — like a tide. He remembered everything you'd ever mentioned wanting. He applied it with the same precision he applied to everything else. Afterward he was still, warm, his hand on your back, and he said: "You're the only thing I chose." It was the most words he'd ever given you at once. You understood that was the whole ocean.</p>`

// ─── WIRE ALL SCENE BRANCHES (all scenes now declared) ───────
(function wireScenes(){
  // CH13: option[0] poly → GOOD_PATH, option[1] single → NORMAL_CHOICE_SCENE
  const ch13Choice=CH13.find(b=>b.type==='choice');
  if(ch13Choice){
    const polyResp=ch13Choice.options[0].response;
    const polyBranch=polyResp[polyResp.length-1];
    if(polyBranch&&polyBranch.type==='branch')polyBranch.scene=GOOD_PATH;
    const singleResp=ch13Choice.options[1].response;
    const singleBranch=singleResp[singleResp.length-1];
    if(singleBranch&&singleBranch.type==='branch')singleBranch.scene=NORMAL_CHOICE_SCENE;
  }
  // CH12: option[1] "leave" → BAD_END_LEAD (already wired above, guard re-wire)
  const ch12Choice=CH12.find(b=>b.type==='choice');
  if(ch12Choice){
    const runResp=ch12Choice.options[1].response;
    const runBranch=runResp[runResp.length-1];
    if(runBranch&&runBranch.type==='branch'&&!runBranch.scene)runBranch.scene=BAD_END_LEAD;
  }
})();
